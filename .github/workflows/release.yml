name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Broked UI
      working-directory: broked-ui
      run: |
        npm ci
        npm run build

    - name: Verify UI build
      run: |
        ls -la broked/ui/dist/
        test -f broked/ui/dist/index.html

    - name: Run BrokoliSQL tests
      run: go test ./... -count=1

    - name: Run Broked tests
      working-directory: broked
      run: go test ./... -count=1

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
