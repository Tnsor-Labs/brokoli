name: Tests

on:
  push:
    branches: [ main, broked ]
  pull_request:
    branches: [ main ]

jobs:
  test-brokolisql:
    name: BrokoliSQL Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Test
      run: go test -v -race ./...
    - name: Test Coverage
      run: go test -coverprofile=coverage.out ./...
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
      continue-on-error: true

  test-broked:
    name: Broked Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Test Engine
      working-directory: broked
      run: go test -v -race ./engine/...
    - name: Test Crypto
      working-directory: broked
      run: go test -v -race ./crypto/...
    - name: Test Quality
      working-directory: broked
      run: go test -v -race ./quality/...
    - name: Test Store
      working-directory: broked
      run: go test -v -race ./store/...
    - name: Test Coverage
      working-directory: broked
      run: |
        go test -coverprofile=broked-coverage.out ./...
        echo "=== Coverage ==="
        go tool cover -func=broked-coverage.out | tail -1

  build-broked:
    name: Build Broked Binary
    runs-on: ubuntu-latest
    needs: [test-broked]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Build UI
      working-directory: broked-ui
      run: |
        npm ci
        npm run build
    - name: Build binary
      working-directory: broked
      run: |
        CGO_ENABLED=0 go build -o broked .
        ls -lh broked
        echo "Binary size: $(du -h broked | cut -f1)"
    - name: Smoke test
      working-directory: broked
      run: |
        ./broked --help
        echo "Smoke test passed"
