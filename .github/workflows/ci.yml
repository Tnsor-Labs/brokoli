name: CI

on:
  push:
    branches: [ main, broked ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Check formatting
      run: |
        if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
          echo "Files not formatted:"
          gofmt -l .
          exit 1
        fi
    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    - name: Lint BrokoliSQL
      run: golangci-lint run ./...
      continue-on-error: true

  test-brokolisql:
    name: BrokoliSQL Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Test
      run: go test -v -race ./...

  test-broked:
    name: Broked Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Test
      working-directory: broked
      run: go test -v -race ./engine/... ./crypto/... ./quality/... ./store/...
    - name: Coverage
      working-directory: broked
      run: |
        go test -coverprofile=coverage.out ./engine/... ./crypto/... ./quality/... ./store/...
        echo "=== Coverage ==="
        go tool cover -func=coverage.out | tail -1

  build-broked:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: [test-broked]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Build UI
      working-directory: broked-ui
      run: |
        npm ci
        npm run build
    - name: Build binary
      working-directory: broked
      run: |
        CGO_ENABLED=0 go build -o broked .
        echo "Binary size: $(du -h broked | cut -f1)"
    - name: Smoke test
      working-directory: broked
      run: ./broked --help
