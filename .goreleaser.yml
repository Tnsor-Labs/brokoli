version: 2

before:
  hooks:
    - go mod tidy

builds:
  # Original BrokoliSQL CLI
  - id: brokolisql
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    main: ./main.go
    binary: brokolisql

  # Broked orchestration platform (UI must be pre-built before goreleaser runs)
  - id: broked
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    dir: ./broked
    main: .
    binary: broked

archives:
  - id: brokolisql
    ids:
      - brokolisql
    name_template: >-
      brokolisql_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE*
      - CHANGELOG*

  - id: broked
    ids:
      - broked
    name_template: >-
      broked_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - broked/README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^refactor:'
      - '^examples:'
      - Merge pull request
      - Merge branch
