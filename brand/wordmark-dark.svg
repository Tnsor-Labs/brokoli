<svg viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="80" fill="#0C0C14"/>

  <!-- TL mark scaled to fit 64×64, vertically centered in 80px: translate(8, 8) scale(0.64) -->
  <g transform="translate(8, 8) scale(0.64)">
    <rect x="4"  y="8"  width="44" height="14" fill="#F2F2FA"/>
    <rect x="20" y="22" width="12" height="70" fill="#F2F2FA"/>
    <rect x="52" y="8"  width="12" height="70" fill="#F2F2FA"/>
    <rect x="52" y="78" width="44" height="14" fill="#F2F2FA"/>
  </g>

  <!-- Divider -->
  <line x1="88" y1="20" x2="88" y2="60" stroke="#F2F2FA" stroke-width="0.5" opacity="0.15"/>

  <!-- TNSOR -->
  <text
    x="102" y="36"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="400"
    letter-spacing="4"
    fill="#F2F2FA"
  >TNSOR</text>

  <!-- LABS -->
  <text
    x="103" y="55"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="10"
    font-weight="300"
    letter-spacing="7"
    fill="#72729A"
  >LABS</text>
</svg>
